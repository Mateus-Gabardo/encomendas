name: Publicar release Android

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restaurar dependencias Flutter
        run: flutter pub get

      - name: Analisar codigo
        run: flutter analyze

      - name: Executar testes
        run: flutter test

      - name: Validar chave de assinatura
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: test -n "$ANDROID_KEYSTORE_BASE64"

      - name: Configurar assinatura Android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=app/release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Publicar release semantica
        run: >
          npx --yes
          --package=semantic-release@25
          --package=@semantic-release/changelog
          --package=@semantic-release/exec
          --package=@semantic-release/git
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
